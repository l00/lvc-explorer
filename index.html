<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVC Explorer</title>
    <link rel="icon" type="image/png3" sizes="180x180" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<script src="translations.js"></script>
<script src="config.js"></script>
<script src="fetchInfo.js"></script>
<script src="fetchBlock.js"></script>
<script src="search.js"></script>

<body>
    <div id="language-button">
        <button id="langToggle"></button>
        <script>
        document.getElementById('langToggle').textContent = lang === 'en' ? 'бг' : 'en';
        document.getElementById('langToggle').addEventListener('click', () => {
            localStorage.setItem('lang', lang === 'en' ? 'bg' : 'en');
            location.reload();
        });
        </script>
    </div>

    <div id="logo">
        <img src="logo.png" alt="Levcoin Logo">
        <p>Explorer</p>
    </div>
    <hr class="solid">
    <div id="info"></div>
    <script>
        fetchInfo();
    </script>
    
    <br>
    <h2 id="search-title"></h2>
    <div id="search-container">
        <input type="text" id="searchInput" placeholder="">
        <button onclick="search()"><img width=18px; height=18px; src="search.png" alt="Search"></button>
    </div>
    <script>
        document.getElementById('search-title').textContent = t('search_title');
        document.getElementById('searchInput').placeholder = t('search_placeholder');
        document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') search(); });
    </script>

    <div id="search-result"></div>

    <script>
        search();
    </script>

    <h2 id="latest-blocks-title"></h2>
    <div id="last-ten-blocks"></div>
    <script>
        document.getElementById('latest-blocks-title').textContent = t('latest_blocks');
    </script>
    <script>
        fetchBlock();
    </script>

    <script>
    function copyBtn(text) {
    return `<button onclick="navigator.clipboard.writeText('${text}');
        const check = this.querySelector('.icon-check');
        check.style.opacity='1';
        setTimeout(() => check.style.opacity='0', 2000);
        " class="copy-btn">
        <img width="20" height="20" src="clipboard.png" alt="Copy">
        <img width="20" height="20" src="clipboard-check.png" alt="Copied" class="icon-check">
    </button>`;
    }
    </script>

    <footer>
        <hr class="solid">
        <p><a href="http://127.0.0.1:8000/docs" id="api-docs-link"></a> • 
        <a href="https://github.com/l00/lvc-explorer">Github</a></p>
    </footer>
    <script>
        document.getElementById('api-docs-link').textContent = t('api_docs');
    </script>
</body>
</html>
