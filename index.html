<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVC Explorer</title>
    <link rel="icon" type="image/png3" sizes="180x180" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<script src="translations.js"></script>
<script src="config.js"></script>
<script src="fetchInfo.js"></script>
<script src="fetchBlock.js"></script>
<script src="search.js"></script>

<body>
    <button id="lang-toggle"></button>
    <script>
    document.getElementById('lang-toggle').textContent = lang === 'en' ? 'бг' : 'en';
    document.getElementById('lang-toggle').addEventListener('click', () => {
        localStorage.setItem('lang', lang === 'en' ? 'bg' : 'en');
        location.reload();
    });
    </script>

    <button id="theme-toggle"></button>
    <script>
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'light') document.body.classList.add('light');

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.textContent = theme === 'dark' ? '☀' : '☾';

        themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        themeToggle.textContent = isLight ? '☾' : '☀';
        });
    </script>

    <div id="title">
        <img src="logo.png" id="lvc-logo" alt="Levcoin Logo">
        <p>Explorer</p>
    </div>
    <hr class="solid">
    <div id="info"></div>
    <script>
        fetchInfo();
    </script>
    
    <br>
    <h2 id="search-title"></h2>
    <div id="search-container">
        <input type="text" id="searchInput" placeholder="">
        <button onclick="search()"><img width=18px height=18px src="search.png" alt="Search"></button>
    </div>
    <script>
        document.getElementById('search-title').textContent = t('search_title');
        document.getElementById('searchInput').placeholder = t('search_placeholder');
        document.getElementById('searchInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') search(); });
    </script>

    <div id="search-result"></div>

    <script>
        search();
    </script>

    <h2 id="latest-blocks-title"></h2>
    <div id="last-ten-blocks"></div>
    <script>
        document.getElementById('latest-blocks-title').textContent = t('latest_blocks');
    </script>
    <script>
        fetchBlock();
    </script>

    <script>
    function copyBtn(text) {
    return `<button onclick="navigator.clipboard.writeText('${text}');
        const check = this.querySelector('#icon-check');
        check.style.opacity='1';
        setTimeout(() => check.style.opacity='0', 2000);
        " id="copy-btn">
        <img width="20" height="20" src="clipboard.png" alt="Copy">
        <img width="20" height="20" src="clipboard-check.png" alt="Copied" id="icon-check">
    </button>`;
    }
    </script>

    <footer>
        <hr class="solid">
        <p><a href="https://api-explorer.levcoin.net/docs" id="api-docs-link"></a> • 
        <a href="https://github.com/l00/lvc-explorer">Github</a></p>
    </footer>
    <script>
        document.getElementById('api-docs-link').textContent = t('api_docs');
    </script>
</body>
</html>
